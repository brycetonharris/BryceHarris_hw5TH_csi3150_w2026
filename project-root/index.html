<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Used Car Dealership</title>

<link rel="stylesheet" href="css/style.css">

<script src="js/usedCars-TH-1.js"></script>
<script src="js/main.js" defer></script>
</head>

<body>

<header>
<h1>Used Car Dealership</h1>
</header>

<main>
<section class="filters">

<h2>Filter Cars</h2>

<form id="filterForm">
<label for="minYear">Min Year</label>
<input type="number" id="minYear">

<label for="maxYear">Max Year</label>
<input type="number" id="maxYear">

<label for="maxMileage">Max Mileage</label>
<input type="number" id="maxMileage">

<label for="minPrice">Min Price</label>
<input type="number" id="minPrice">

<label for="maxPrice">Max Price</label>
<input type="number" id="maxPrice">

<label for="make">Make</label>
<select id="make" multiple size="8">
</select>
<p class="filter-help">Hold Command on Mac or Ctrl on Windows to select more than one make.</p>

<label for="color">Color</label>
<select id="color" multiple size="7">
</select>
<p class="filter-help">Hold Command on Mac or Ctrl on Windows to select more than one color.</p>

<button type="submit">Apply Filters</button>
</form>

</section>

<section id="carContainer" class="car-container"></section>

<p id="noResults"></p>
</main>

</body>
</html>
